<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自动化采集工具</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1 style="margin-top: 0;">🔄 自动化工具</h1>
    
    <!-- 配置区 -->
    <div class="config-section">
      <h2 style="margin-top: 0;">1️⃣ ⚙️ 基础配置</h2>
      
      <!-- URL 列表 -->
      <div class="config-item">
        <label for="urlsInput">📋 商品网址URL（一行一个）</label>
        <textarea id="urlsInput" class="urls-textarea" placeholder="https://example.com/page1
https://example.com/page2
https://example.com/page3"></textarea>
        <small id="urlCount">已添加：0 个URL</small>
      </div>
      
      <!-- 选择器 -->
      <div class="config-item" style="position: absolute; opacity: 0; right: 9999px;">
        <label for="selectorInput">🎯 要点击的元素（CSS选择器）</label>
        <input type="text" id="selectorInput" class="selector-input"
               placeholder="例：.el-button.el-button--primary 或 #button-id"
               value=".el-button.el-button--primary.el-button--mini">
        <small>注：所有URL都将使用此选择器</small>
      </div>
      
      <!-- 应用按钮 -->
      <button id="applyBtn" class="btn btn-primary">✅ 应用配置</button>
    </div>

    <!-- 运行控制区 -->
    <div class="control-section" style="padding-bottom: 10px;">
      <h2 style="margin-top: 0;">2️⃣ 🎮 运行控制</h2>
      
      <div class="status-box">
        <p><strong>状态:</strong> <span id="status" class="status-idle">未运行</span></p>
        <p><strong>进度:</strong> <span id="progress">0/0</span></p>
        <p><strong>当前 URL:</strong> <span id="currentUrl">-</span></p>
      </div>

      <div class="button-group">
        <button id="startBtn" class="btn btn-success">▶️ 开始运行</button>
        <button id="pauseBtn" class="btn btn-warning" disabled style="position: absolute; opacity: 0;">⏸️ 暂停</button>
        <button id="stopBtn" class="btn btn-danger" disabled>⏹️ 停止</button>
      </div>
    </div>

    <!-- 日志区 -->
    <div class="log-section">
      <h2 style="margin-top: 0;">3️⃣ 📝 运行日志</h2>
      <div style="display: flex; gap: 8px; margin-bottom: 10px;">
        <button id="exportLogsBtn" class="btn btn-info" style="flex: 1; font-size: 12px;">💾 导出日志</button>
        <button id="clearLogsBtn" class="btn btn-danger" style="flex: 1; font-size: 12px;">🗑️ 清空日志</button>
      </div>
      <div id="logBox" class="log-box">
        <p class="log-item">等待运行...</p>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
  <script src="log-manager.js"></script>
</body>
</html>
